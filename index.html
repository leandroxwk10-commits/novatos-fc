<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatos FC — Agendar Jogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1a3c6e;
    --azul-claro: #2a5298;
    --branco: #f5f7fa;
    --cinza: #8a96a8;
    --borda: #dde3ed;
    --verde: #1a7a4a;
    --verde-bg: #e8f5ee;
    --amarelo: #c47d00;
    --amarelo-bg: #fff8e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: #0d1b2e;
    min-height: 100vh;
    color: #fff;
  }
  .bg-pattern {
    position: fixed; inset: 0; z-index: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 60px,
      rgba(255,255,255,0.02) 60px, rgba(255,255,255,0.02) 61px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 60px,
      rgba(255,255,255,0.02) 60px, rgba(255,255,255,0.02) 61px
    );
  }
  .wrap { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  header { text-align: center; margin-bottom: 2.5rem; }
  .escudo {
    width: 72px; height: 72px; background: var(--azul-claro);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem; font-size: 32px; border: 3px solid rgba(255,255,255,0.15);
  }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.06em; color: #fff; }
  .subtitulo { font-size: 14px; color: var(--cinza); margin-top: 4px; }
  .infos { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap; }
  .info-item { font-size: 12px; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 5px; }
  .info-item svg { opacity: 0.7; }

  .card {
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 1.5rem;
    backdrop-filter: blur(8px);
  }
  .step-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--cinza); text-transform: uppercase; margin-bottom: 1rem; }

  .mes-head { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--cinza); text-transform: uppercase; margin: 1.2rem 0 0.5rem; }
  .mes-head:first-child { margin-top: 0; }

  .slot {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    border: 0.5px solid rgba(255,255,255,0.08);
    cursor: pointer; margin-bottom: 6px;
    transition: all 0.15s;
  }
  .slot:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
  .slot.selected { border-color: #4a9eff; background: rgba(74,158,255,0.1); }
  .slot.ocupado { opacity: 0.4; cursor: not-allowed; }
  .slot-data { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.05em; min-width: 52px; }
  .slot-info { flex: 1; }
  .slot-nome { font-size: 13px; font-weight: 500; color: #fff; }
  .slot-detalhe { font-size: 11px; color: var(--cinza); margin-top: 1px; }
  .slot-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
  .slot-badge.livre { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
  .slot-badge.ocupado { background: rgba(255,80,80,0.15); color: #ff7070; }

  .radio { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .slot.selected .radio { border-color: #4a9eff; }
  .radio-dot { width: 8px; height: 8px; border-radius: 50%; background: #4a9eff; display: none; }
  .slot.selected .radio-dot { display: block; }

  .form-group { margin-bottom: 1rem; }
  label { font-size: 12px; font-weight: 600; color: var(--cinza); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  input[type=text] {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 14px; font-family: 'Barlow', sans-serif; outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: #4a9eff; }
  input[type=text]::placeholder { color: rgba(255,255,255,0.25); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .data-selecionada { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 1.2rem; }
  .data-selecionada strong { color: #4a9eff; }

  .btn {
    width: 100%; padding: 13px; border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.08em;
    cursor: pointer; border: none; transition: all 0.15s; margin-top: 0.5rem;
  }
  .btn-azul { background: #2a5298; color: #fff; }
  .btn-azul:hover { background: #3a62a8; }
  .btn-azul:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-verde { background: var(--verde); color: #fff; }
  .btn-verde:hover { background: #228855; }
  .btn-ghost { background: transparent; border: 0.5px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); font-size: 13px; font-family: 'Barlow', sans-serif; font-weight: 500; letter-spacing: 0; padding: 10px; margin-top: 8px; }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  .sucesso { text-align: center; padding: 1rem 0; }
  .sucesso-icon { font-size: 3rem; margin-bottom: 1rem; }
  .sucesso h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .sucesso p { font-size: 13px; color: var(--cinza); line-height: 1.6; }
  .sucesso-detalhe { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 14px; margin: 1rem 0; font-size: 13px; text-align: left; line-height: 1.8; }

  .erro { font-size: 12px; color: #ff7070; margin-top: 6px; display: none; }
  .loading { opacity: 0.6; pointer-events: none; }

  /* spinner */
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="wrap">

  <header>
    <div class="escudo">⚽</div>
    <h1>Novatos FC</h1>
    <p class="subtitulo">Agendamento de jogos — 2026</p>
    <div class="infos">
      <span class="info-item">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Apenas sábados
      </span>
      <span class="info-item">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        07h às 09h
      </span>
      <span class="info-item">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8 2 4 5 4 9c0 5 8 13 8 13s8-8 8-13c0-4-3-7-8-7z"/></svg>
        Visitantes
      </span>
    </div>
  </header>

  <!-- STEP 1: escolha de data -->
  <div class="card" id="step1">
    <div class="step-label">1 — Escolha a data</div>
    <div id="lista-datas"></div>
    <button class="btn btn-azul" id="btn-step1" onclick="irStep2()" disabled>Continuar →</button>
  </div>

  <!-- STEP 2: dados do time -->
  <div class="card" id="step2" style="display:none; margin-top:1rem;">
    <div class="step-label">2 — Dados do seu time</div>
    <div class="data-selecionada">Data selecionada: <strong id="data-exibida"></strong></div>
    <div class="form-group">
      <label>Nome do time</label>
      <input type="text" id="f-time" placeholder="ex: Centenários FC" maxlength="40">
      <div class="erro" id="err-time">Informe o nome do time</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Horário</label>
        <input type="text" id="f-horario" placeholder="ex: 08:00" maxlength="5">
      </div>
      <div class="form-group">
        <label>Cidade / Bairro</label>
        <input type="text" id="f-local" placeholder="ex: Vila Madalena" maxlength="40">
      </div>
    </div>
    <div class="form-group">
      <label>Contato WhatsApp</label>
      <input type="text" id="f-whatsapp" placeholder="ex: 11 99999-9999" maxlength="20">
      <div class="erro" id="err-wpp">Informe o WhatsApp para contato</div>
    </div>
    <div id="err-geral" class="erro" style="font-size:13px;margin-bottom:8px;display:none;"></div>
    <button class="btn btn-verde" id="btn-enviar" onclick="enviar()">Enviar solicitação ✓</button>
    <button class="btn btn-ghost" onclick="voltarStep1()">← Voltar</button>
    <div class="spinner" id="spinner"></div>
  </div>

  <!-- STEP 3: confirmação -->
  <div class="card" id="step3" style="display:none; margin-top:1rem;">
    <div class="sucesso">
      <div class="sucesso-icon">✅</div>
      <h2>Solicitação enviada!</h2>
      <p>O organizador do Novatos FC vai entrar em contato pelo WhatsApp para confirmar.</p>
      <div class="sucesso-detalhe" id="resumo"></div>
      <button class="btn btn-ghost" onclick="reiniciar()">Fazer outra solicitação</button>
    </div>
  </div>

</div>

<script>
// ─── CONFIGURAÇÃO ───────────────────────────────────────────────
// Cole aqui a URL do seu Google Apps Script depois de publicar
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqIKdkdmZJVuPHQglT4lioUqtV5gkZ-8tBMhPcE1e1NFZ9NxN4obqjgvM-sr1C-FEm/exec';
// ────────────────────────────────────────────────────────────────

const sabadosFixos = [
  // Junho
  {data:'06/06',mes:'Junho',livre:true},
  {data:'13/06',mes:'Junho',livre:true},
  {data:'20/06',mes:'Junho',livre:true},
  {data:'27/06',mes:'Junho',livre:true},
  // Julho
  {data:'04/07',mes:'Julho',livre:true},
  {data:'11/07',mes:'Julho',livre:true},
  {data:'18/07',mes:'Julho',livre:true},
  {data:'25/07',mes:'Julho',livre:true},
  // Agosto
  {data:'01/08',mes:'Agosto',livre:true},
  {data:'08/08',mes:'Agosto',livre:true},
  {data:'15/08',mes:'Agosto',livre:true},
  {data:'22/08',mes:'Agosto',livre:true},
  {data:'29/08',mes:'Agosto',livre:true},
  // Setembro
  {data:'05/09',mes:'Setembro',livre:true},
  {data:'12/09',mes:'Setembro',livre:true},
  {data:'19/09',mes:'Setembro',livre:true},
  {data:'26/09',mes:'Setembro',livre:true},
  // Outubro
  {data:'03/10',mes:'Outubro',livre:true},
  {data:'10/10',mes:'Outubro',livre:true},
  {data:'17/10',mes:'Outubro',livre:true},
  {data:'24/10',mes:'Outubro',livre:true},
  {data:'31/10',mes:'Outubro',livre:true},
  // Novembro
  {data:'07/11',mes:'Novembro',livre:true},
  {data:'14/11',mes:'Novembro',livre:true},
  {data:'21/11',mes:'Novembro',livre:true},
  {data:'28/11',mes:'Novembro',livre:true},
  // Dezembro
  {data:'05/12',mes:'Dezembro',livre:true},
  {data:'12/12',mes:'Dezembro',livre:true},
  {data:'19/12',mes:'Dezembro',livre:true},
  {data:'26/12',mes:'Dezembro',livre:true},
];

let dataSelecionada = null;
let ocupadas = [];

function carregarOcupadas() {
  if (!SCRIPT_URL || SCRIPT_URL.includes('COLE_AQUI')) { renderDatas(); return; }
  window._jsonpCallback = function(d) {
    ocupadas = d.ocupadas || [];
    renderDatas();
    delete window._jsonpCallback;
    const s = document.getElementById('_jsonp_script');
    if (s) s.remove();
  };
  const script = document.createElement('script');
  script.id = '_jsonp_script';
  script.src = SCRIPT_URL + '?action=listar&callback=_jsonpCallback&t=' + Date.now();
  script.onerror = function() { renderDatas(); };
  document.head.appendChild(script);
}

function renderDatas() {
  const c = document.getElementById('lista-datas');
  c.innerHTML = '';
  let mesAtual = '';
  sabadosFixos.forEach(s => {
    const ocupadaObj = ocupadas.find ? ocupadas.find(o => (typeof o === 'object' ? o.data : o) === s.data) : null;
    const estaOcupada = !!ocupadaObj || ocupadas.includes(s.data);
    const nomeAdversario = ocupadaObj && typeof ocupadaObj === 'object' && ocupadaObj.time ? ocupadaObj.time : '';
    const horarioJogo = ocupadaObj && typeof ocupadaObj === 'object' && ocupadaObj.horario ? ocupadaObj.horario : '';
    if (s.mes !== mesAtual) {
      mesAtual = s.mes;
      const mh = document.createElement('div');
      mh.className = 'mes-head';
      mh.textContent = s.mes;
      c.appendChild(mh);
    }
    const el = document.createElement('div');
    el.className = 'slot' + (estaOcupada ? ' ocupado' : '');
    el.id = 'slot-' + s.data;
    el.innerHTML = `
      <div class="radio"><div class="radio-dot"></div></div>
      <div class="slot-data">${s.data}</div>
      <div class="slot-info">
        <div class="slot-nome">Novatos x ${estaOcupada ? (nomeAdversario || 'não disponível') : 'disponível'}</div>
        <div class="slot-detalhe">${estaOcupada && horarioJogo ? "Sábado · " + horarioJogo + "h · visitantes" : "Sábado · 07h–09h · visitantes"}</div>
      </div>
      <span class="slot-badge ${estaOcupada ? 'ocupado' : 'livre'}">${estaOcupada ? 'ocupado' : 'livre'}</span>
    `;
    if (!estaOcupada) {
      el.onclick = () => selecionarData(s.data);
    }
    c.appendChild(el);
  });
}

function selecionarData(data) {
  document.querySelectorAll('.slot').forEach(el => el.classList.remove('selected'));
  document.getElementById('slot-' + data).classList.add('selected');
  dataSelecionada = data;
  document.getElementById('btn-step1').disabled = false;
}

function irStep2() {
  if (!dataSelecionada) return;
  document.getElementById('step2').style.display = 'block';
  document.getElementById('data-exibida').textContent = dataSelecionada + ' (sábado)';
  document.getElementById('step2').scrollIntoView({behavior:'smooth', block:'start'});
}

function voltarStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').scrollIntoView({behavior:'smooth'});
}

async function enviar() {
  const time = document.getElementById('f-time').value.trim();
  const horario = document.getElementById('f-horario').value.trim();
  const local = document.getElementById('f-local').value.trim();
  const wpp = document.getElementById('f-whatsapp').value.trim();

  document.querySelectorAll('.erro').forEach(e => e.style.display = 'none');
  let ok = true;
  if (!time) { document.getElementById('err-time').style.display = 'block'; ok = false; }
  if (!wpp) { document.getElementById('err-wpp').style.display = 'block'; ok = false; }
  if (!ok) return;

  const btn = document.getElementById('btn-enviar');
  const spinner = document.getElementById('spinner');
  btn.style.display = 'none';
  spinner.style.display = 'block';

  const payload = { action:'agendar', data: dataSelecionada, time, horario, local, whatsapp: wpp };

  try {
    if (SCRIPT_URL && !SCRIPT_URL.includes('COLE_AQUI')) {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
    }
    mostrarSucesso(time, horario, local, wpp);
  } catch(e) {
    spinner.style.display = 'none';
    btn.style.display = 'block';
    const errG = document.getElementById('err-geral');
    errG.textContent = 'Erro ao enviar. Tente novamente ou entre em contato diretamente.';
    errG.style.display = 'block';
  }
}

function mostrarSucesso(time, horario, local, wpp) {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
  document.getElementById('resumo').innerHTML =
    `📅 <b>${dataSelecionada}</b> (sábado)<br>
     ⚽ Novatos FC x <b>${time}</b><br>
     ${horario ? '⏰ ' + horario + 'h<br>' : ''}
     ${local ? '📍 ' + local + '<br>' : ''}
     📱 ${wpp}`;
  document.getElementById('step3').scrollIntoView({behavior:'smooth'});
}

function reiniciar() {
  dataSelecionada = null;
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'none';
  document.getElementById('btn-step1').disabled = true;
  document.querySelectorAll('.slot').forEach(el => el.classList.remove('selected'));
  document.getElementById('f-time').value = '';
  document.getElementById('f-horario').value = '';
  document.getElementById('f-local').value = '';
  document.getElementById('f-whatsapp').value = '';
  carregarOcupadas();
  window.scrollTo({top:0, behavior:'smooth'});
}

if (!sessionStorage.getItem("reloaded")) {
  sessionStorage.setItem("reloaded", "1");
  location.reload(true);
} else {
  sessionStorage.removeItem("reloaded");
  renderDatas();
  carregarOcupadas();
}
</script>
</body>
</html>
